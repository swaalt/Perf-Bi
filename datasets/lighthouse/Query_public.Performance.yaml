sql: "SELECT\r\n  \"timestamp\" AT TIME ZONE 'America/Santiago' AS \"time\",\r\n \
  \ performance\r\nFROM \r\n  lh_results\r\nWHERE (\r\n    {% if from_dttm is not\
  \ none and to_dttm is not none %}\r\n         \"timestamp\" AT TIME ZONE 'America/Santiago'\
  \ >= '{{ from_dttm }}' \r\n         AND \"timestamp\" AT TIME ZONE 'America/Santiago'\
  \ < '{{ to_dttm }}'\r\n    {% else %}\r\n        1=0 \r\n    {% endif %}\r\n)"
