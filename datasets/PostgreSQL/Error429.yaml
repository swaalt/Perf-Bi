schema: public
sql: "WITH filtered_429 AS (\r\n    SELECT\r\n        time_bucket('5 seconds', \"\
  time\" AT TIME ZONE 'America/Santiago') AS time,\r\n        name AS metric,\r\n\
  \        testplan,\r\n        COUNT(*) AS \"429_errors\"\r\n    FROM request\r\n\
  \    WHERE\r\n        (\r\n            {% if from_dttm is not none and to_dttm is\
  \ not none %}\r\n                \"time\" AT TIME ZONE 'America/Santiago' >= '{{\
  \ from_dttm }}'\r\n                AND \"time\" AT TIME ZONE 'America/Santiago'\
  \ < '{{ to_dttm }}'\r\n            {% else %}\r\n                1=0\r\n       \
  \     {% endif %}\r\n        )\r\n        AND\r\n        {% if filter_values('testplan')|length\
  \ > 0 %}\r\n            testplan IN {{ filter_values('testplan')|where_in }}\r\n\
  \        {% else %}\r\n            1=0\r\n        {% endif %}\r\n        AND exception\
  \ IS NOT NULL\r\n        AND (\r\n            exception ILIKE '%429%'\r\n      \
  \      OR exception ILIKE '%Too Many Requests%'\r\n            OR exception ILIKE\
  \ '%rate limit%'\r\n        )\r\n    GROUP BY time, name, testplan\r\n),\r\n\r\n\
  -- \u2592\u2592 STEP 2: Obtener los 7 endpoints con m\xE1s errores \u2592\u2592\r\
  \ntop7 AS (\r\n    SELECT metric\r\n    FROM filtered_429\r\n    GROUP BY metric\r\
  \n    ORDER BY SUM(\"429_errors\") DESC\r\n    LIMIT 7\r\n)\r\n\r\n-- \u2592\u2592\
  \ STEP 3: Mostrar solo los top 7 en el timeseries \u2592\u2592\r\nSELECT\r\n   \
  \ f.time,\r\n    f.metric,\r\n    f.testplan,\r\n    SUM(f.\"429_errors\") AS \"\
  429_errors\"\r\nFROM filtered_429 f\r\nJOIN top7 t ON f.metric = t.metric\r\nGROUP\
  \ BY f.time, f.metric, f.testplan\r\nORDER BY f.time;\r\n"
