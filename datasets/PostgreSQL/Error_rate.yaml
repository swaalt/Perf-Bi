table_name: Error rate %
main_dttm_col: time
description: null
default_endpoint: null
offset: 0
cache_timeout: null
catalog: postgres
schema: public
sql: "SELECT\r\n  (COUNT(*) FILTER (WHERE exception IS NOT NULL) * 100.0 / NULLIF(COUNT(*),\
  \ 0))/100.0 AS error_rate,\r\n  max( time_bucket('5 seconds',\"time\" AT TIME ZONE\
  \ 'America/Santiago')) as time,\r\n  MAX(testplan) as testplan\r\nFROM \r\n  request\r\
  \n WHERE (\r\n    {% if from_dttm is not none and to_dttm is not none %}\r\n   \
  \    (\"time\" AT TIME ZONE 'America/Santiago') BETWEEN '{{ from_dttm }}' AND '{{\
  \ to_dttm }}'\r\n    {% else %}\r\n        FALSE\r\n    {% endif %}\r\n  )\r\n \
  \ AND \r\n      {% if filter_values('testplan') %}\r\n          (testplan IN {{\
  \ filter_values('testplan')|where_in }})\r\n      {% else %}\r\n         FALSE\r\
  \n      {% endif %}\r\n"
