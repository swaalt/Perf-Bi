offset: 0
cache_timeout: null
catalog: postgres
schema: public
sql: "  SELECT \n    time_bucket('5 seconds', \"time\" AT TIME ZONE 'America/Santiago')\
  \ AS time_interval,\n    count(*)/5.0 as \"Error rate\",\n    testplan\n  FROM \n\
  \    request\nWHERE (\n    {% if from_dttm is not none and to_dttm is not none %}\n\
  \        \"time\" AT TIME ZONE 'America/Santiago' > '{{ from_dttm }}' AND \"time\"\
  \ AT TIME ZONE 'America/Santiago' < '{{ to_dttm }}'\n    {% else %}\n        1=0\
  \ \n    {% endif %}\n)\nAND \n    {% if filter_values('testplan') %}\n        (testplan\
  \ IN {{ filter_values('testplan')|where_in }})\n    {% else %}\n        1=0\n  \
  \  {% endif %}\nAND \nexception IS NOT NULL\n  GROUP BY \n    time_interval,3\n"
