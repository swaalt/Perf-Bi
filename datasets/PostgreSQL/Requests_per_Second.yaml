table_name: Requests per Second
main_dttm_col: time_interval
description: null
default_endpoint: null
offset: 0
cache_timeout: null
catalog: postgres
schema: public
sql: "  SELECT \r\n    time_bucket('5 seconds', \"time\" AT TIME ZONE 'America/Santiago')\
  \ AS time_interval,\r\n    COUNT(*) / 5.0 AS req_per_sec,\r\n    name,\r\n    testplan\r\
  \n  FROM \r\n    request\r\n WHERE (\r\n    {% if from_dttm is not none and to_dttm\
  \ is not none %}\r\n        \"time\" AT TIME ZONE 'America/Santiago' > '{{ from_dttm\
  \ }}' AND \"time\" AT TIME ZONE 'America/Santiago' < '{{ to_dttm }}'\r\n    {% else\
  \ %}\r\n        1=0 \r\n    {% endif %}\r\n  )\r\n  AND \r\n      {% if filter_values('testplan')\
  \ %}\r\n          (testplan IN {{ filter_values('testplan')|where_in }})\r\n   \
  \   {% else %}\r\n          1=0\r\n      {% endif %}\r\n  GROUP BY \r\n    time_interval,3,4"
