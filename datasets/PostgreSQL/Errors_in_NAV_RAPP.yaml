table_name: Errors in "NAV RAPP"
main_dttm_col: time_interval
description: null
default_endpoint: null
offset: 0
cache_timeout: null
catalog: postgres
schema: public
sql: "WITH error_counts AS (\n    SELECT \n        MAX(time_bucket('5 seconds', \"\
  time\" AT TIME ZONE 'America/Santiago')) AS time_interval,\n        LEFT(exception,\
  \ 100) AS exception,  -- ACHICADO para que se vea mejor en tabla\n        name,\n\
  \        testplan,\n        COUNT(*) AS error_count\n    FROM \n        request\n\
  \    WHERE (\n        {% if from_dttm is not none and to_dttm is not none %}\n \
  \           \"time\" AT TIME ZONE 'America/Santiago' > '{{ from_dttm }}' AND \"\
  time\" AT TIME ZONE 'America/Santiago' < '{{ to_dttm }}'\n        {% else %}\n \
  \           1=0 \n        {% endif %}\n    )\n    AND \n        {% if filter_values('testplan')\
  \ %}\n            (testplan IN {{ filter_values('testplan')|where_in }})\n     \
  \   {% else %}\n            1=0\n        {% endif %}\n        AND\n            exception\
  \ IS NOT NULL AND\n            name LIKE '%NAV RAPP%'\n    GROUP BY \n        name,\
  \ testplan, exception\n),\ntotal_requests AS (\n    SELECT \n        name,\n   \
  \     testplan,\n        COUNT(*) AS total_count\n    FROM \n        request \n\
  \    WHERE (\n        {% if from_dttm is not none and to_dttm is not none %}\n \
  \           \"time\" AT TIME ZONE 'America/Santiago' > '{{ from_dttm }}' AND \"\
  time\" AT TIME ZONE 'America/Santiago' < '{{ to_dttm }}'\n        {% else %}\n \
  \           1=0 \n        {% endif %}\n    )\n    AND \n        {% if filter_values('testplan')\
  \ %}\n            (testplan IN {{ filter_values('testplan')|where_in }})\n     \
  \   {% else %}\n            1=0\n        {% endif %}\n        AND\n            name\
  \ LIKE '%NAV RAPP%'\n    GROUP BY \n        name, testplan\n)\nSELECT \n    e.time_interval,\n\
  \    e.exception,\n    e.name,\n    e.testplan,\n    e.error_count,\n    ROUND((e.error_count::decimal\
  \ / t.total_count) * 100, 2) AS error_percentage\nFROM \n    error_counts e\nJOIN\
  \ total_requests t ON e.name = t.name AND e.testplan = t.testplan\nORDER BY \n \
  \   error_percentage DESC\nLIMIT 7;\n"
