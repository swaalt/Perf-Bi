table_name: Request per second / Active Users
main_dttm_col: time
description: null
default_endpoint: null
offset: 0
cache_timeout: null
catalog: postgres
schema: public
sql: "WITH req_per_sec AS (\n  SELECT \n    time_bucket('5 seconds', \"time\" AT TIME\
  \ ZONE 'America/Santiago') AS time_interval,\n    COUNT(*) / 5 AS req_per_sec,\n\
  \    max(testplan) as testplan\n  FROM \n    request\nWHERE (\n    {% if from_dttm\
  \ is not none and to_dttm is not none %}\n       \"time\" AT TIME ZONE 'America/Santiago'\
  \ > '{{ from_dttm }}' AND \"time\" AT TIME ZONE 'America/Santiago'  < '{{ to_dttm\
  \ }}'\n    {% else %}\n        1=0 \n    {% endif %}\n)\nAND \n    {% if filter_values('testplan')\
  \ %}\n        (testplan IN {{ filter_values('testplan')|where_in }})\n    {% else\
  \ %}\n        1=0\n    {% endif %}\n  GROUP BY \n    time_interval\n),\nactive_users\
  \ AS (\n  SELECT \n   time_bucket('5 seconds', \"time\" AT TIME ZONE 'America/Santiago')\
  \ AS time_interval,\n    AVG(user_count) AS active_users\n  FROM \n    user_count\n\
  \ WHERE (\n    {% if from_dttm is not none and to_dttm is not none %}\n        \"\
  time\" AT TIME ZONE 'America/Santiago' > '{{ from_dttm }}' AND \"time\" AT TIME\
  \ ZONE 'America/Santiago' < '{{ to_dttm }}'\n    {% else %}\n        1=0 \n    {%\
  \ endif %}\n)\nAND \n    {% if filter_values('testplan') %}\n        (testplan IN\
  \ {{ filter_values('testplan')|where_in }})\n    {% else %}\n        1=0\n    {%\
  \ endif %}\n  GROUP BY \n    time_interval\n)\nSELECT \n  r.time_interval AS time,\n\
  \  r.req_per_sec,\n  u.active_users,\n  r.testplan\nFROM \n  req_per_sec r\nLEFT\
  \ JOIN \n  active_users u\nON \n  r.time_interval = u.time_interval\nORDER BY \n\
  \  time;\n\n"
